name: Elysia CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      BUILDING_NAME: ${{ secrets.BUILDING_NAME }}
      BUILDING_ADDRESS: ${{ secrets.BUILDING_ADDRESS }}
      BUILDING_CONTACT: ${{ secrets.BUILDING_CONTACT }}
      SMART_HOME_API_URL: ${{ secrets.SMART_HOME_API_URL }}
      SMART_HOME_API_KEY: ${{ secrets.SMART_HOME_API_KEY }}
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest pytest-cov flake8
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - name: Test with pytest
      run: |
        pytest --cov=./ --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      
  build-and-deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      BUILDING_NAME: ${{ secrets.BUILDING_NAME }}
      BUILDING_ADDRESS: ${{ secrets.BUILDING_ADDRESS }}
      BUILDING_CONTACT: ${{ secrets.BUILDING_CONTACT }}
      SMART_HOME_API_URL: ${{ secrets.SMART_HOME_API_URL }}
      SMART_HOME_API_KEY: ${{ secrets.SMART_HOME_API_KEY }}
    steps:
    - uses: actions/checkout@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        push: true
        tags: yourusername/elysia:latest
        build-args: |
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          BUILDING_NAME=${{ secrets.BUILDING_NAME }}
          BUILDING_ADDRESS=${{ secrets.BUILDING_ADDRESS }}
          BUILDING_CONTACT=${{ secrets.BUILDING_CONTACT }}
          SMART_HOME_API_URL=${{ secrets.SMART_HOME_API_URL }}
          SMART_HOME_API_KEY=${{ secrets.SMART_HOME_API_KEY }}