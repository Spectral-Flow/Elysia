version: '3.8'

services:
  elysia:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BUILDING_NAME=${BUILDING_NAME:-Elysia Apartments}
      - BUILDING_ADDRESS=${BUILDING_ADDRESS:-123 Main Street}
      - BUILDING_CONTACT=${BUILDING_CONTACT:-manager@elysiaapartments.com}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

